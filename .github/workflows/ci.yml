name: CI

# Pull requests to master and pushes to master both need to prove the
# wheel still builds, the tests still pass, and the committed UI bundle
# matches what `npm run build` would produce on a clean checkout. Feature
# branches skip the matrix to keep feedback fast; the master-bound PR
# runs the full grid.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  # Tell uv to use the wheel cache under $HOME so the restore-cache
  # action hits it on reruns.
  UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.7"
      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - name: Sync (frozen)
        run: uv sync --frozen --extra dev
      - name: ruff
        run: uv run ruff check asrbench tests
      - name: ruff format --check
        run: uv run ruff format --check asrbench tests
      - name: mypy
        run: uv run mypy asrbench
        continue-on-error: true  # strict-mode migration is tracked in Faz 10

  test:
    name: Tests — Python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
        exclude:
          # macOS-3.11 hits a soxr wheel gap; re-enable once upstream publishes.
          - os: macos-latest
            python: "3.11"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.7"
      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ matrix.python }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-${{ matrix.python }}-
      - name: Sync (frozen)
        run: uv sync --frozen --extra dev --python ${{ matrix.python }}
      - name: pytest + coverage
        run: uv run pytest --cov=asrbench --cov-report=xml --cov-fail-under=0
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage.xml
          path: coverage.xml

  ui-build:
    name: UI bundle sanity check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: npm ci
        working-directory: ui
        run: npm ci
      - name: npm run build
        working-directory: ui
        run: npm run build
      - name: Fail when committed bundle drifted from source
        # CI and wheel both ship from asrbench/static, so a PR that
        # touches ui/ without rebuilding the bundle must be caught here.
        run: |
          if [ -n "$(git status --porcelain asrbench/static)" ]; then
            echo "::error::asrbench/static is out of date. Run 'cd ui && npm run build' and commit the diff."
            git --no-pager diff asrbench/static | head -100
            exit 1
          fi

  wheel-build:
    name: Wheel build sanity
    runs-on: ubuntu-latest
    needs: [test, ui-build]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.7"
      - name: Build wheel + sdist
        run: uv build
      - name: Inspect wheel contents
        run: |
          pip install --no-deps --no-cache-dir dist/*.whl --target /tmp/inspect
          test -f /tmp/inspect/asrbench/static/index.html \
            || (echo "::error::wheel missing static bundle"; exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
