repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ui-bundle-current
        name: Warn when ui/ changes without rebuilding the static bundle
        language: system
        # Only runs when a ui/ source file is staged. Produces a non-blocking
        # reminder — the authoritative check lives in CI (ui-build job) so
        # developers can split "source changes" and "bundle rebuild" across
        # commits when that helps review.
        files: ^ui/(src|index\.html|vite\.config\.js|package(-lock)?\.json)
        entry: python scripts/check_ui_bundle_freshness.py
        pass_filenames: false
